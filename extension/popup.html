<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 300px; padding: 14px; margin: 0; color: #172b4d; }
      h1 { font-size: 14px; margin: 0 0 4px; }
      p { font-size: 12px; color: #5e6c84; margin: 0 0 12px; }
      label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
      input { width: 100%; padding: 7px 9px; border: 1px solid #d3d8de; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
      button { margin-top: 10px; width: 100%; background: #0c66e4; color: #fff; border: none; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
      .status { font-size: 12px; margin-top: 8px; min-height: 16px; }
      .ok { color: #1f845a; } .err { color: #ae2a19; }
      .hint { font-size: 11px; color: #8993a4; margin-top: 10px; }
    </style>
  </head>
  <body>
    <h1>Trello AI Agent</h1>
    <p>Set the URL of your deployed agent backend.</p>
    <label for="url">Backend URL</label>
    <input id="url" type="text" placeholder="https://your-app.vercel.app" />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <div class="hint">Open a Trello board, then click the 🤖 button at the bottom-right.</div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
